document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

justify-content:center; font-family:'DM Sans',system-ui,sans-serif;\" data-speaker-notes=\"AutoRally is a desktop app for badminton club organizers. Today I'll walk through what it does, how it works, and the thinking behind it.\">\n\n  <div style=\"display:inline-flex; align-items:center; gap:8px; background:#052E16; border:1px solid #065F46; border-radius:9999px; padding:8px 20px; margin-bottom:48px;\">\n    <span style=\"width:7px; height:7px; border-radius:50%; background:#059669; animation:pulse 2s ease-in-out infinite; display:inline-block;\"><\u002Fspan>\n    <span style=\"font-size:var(--type-micro); font-weight:600; color:#34D399; letter-spacing:0.06em; text-transform:uppercase;\">Version 1.1<\u002Fspan>\n  <\u002Fdiv>\n\n  <h1 style=\"font-size:116px; font-weight:700; color:#FFFFFF; letter-spacing:-0.04em; line-height:1; margin-bottom:28px; font-family:'DM Sans',system-ui,sans-serif;\">AutoRally<\u002Fh1>\n\n  <p style=\"font-size:var(--type-subtitle); font-weight:500; color:#059669; letter-spacing:-0.01em; margin-bottom:56px;\">Badminton Club Management<\u002Fp>\n\n  <div style=\"width:60px; height:1px; background:#27272A; margin-bottom:48px;\"><\u002Fdiv>\n\n  <p style=\"font-size:var(--type-small); color:#52525B; letter-spacing:0.03em; font-weight:400;\">Players &nbsp;·&nbsp; Sessions &nbsp;·&nbsp; Matches &nbsp;·&nbsp; Tournaments<\u002Fp>\n<\u002Fsection>\n\n\n<!-- ════ SLIDE 2 · Managing a club today ════ -->\n<section data-label=\"02\" data-screen-label=\"Managing a club today\" style=\"background:#F7F7F8; display:flex; flex-direction:column; padding:var(--pad-y) var(--pad-x); font-family:'DM Sans',system-ui,sans-serif; justify-content:center; gap:56px;\" data-speaker-notes=\"Every club organizer runs into the same three walls. Let's look at what they deal with before AutoRally.\">\n\n  <div style=\"display:flex; flex-direction:column; gap:16px;\">\n    <span style=\"font-size:var(--type-micro); font-weight:600; color:#A1A1AA; letter-spacing:0.08em; text-transform:uppercase;\">The challenge<\u002Fspan>\n    <h2 style=\"font-size:var(--type-title); font-weight:700; color:#18181B; letter-spacing:-0.025em; line-height:1.08;\">Managing a club today<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; gap:24px;\">\n\n    <div style=\"flex:1; background:#FFFFFF; border:1px solid #E4E4E7; border-radius:16px; padding:40px 36px; display:flex; flex-direction:column; gap:20px;\">\n      <span style=\"font-size:52px; font-weight:700; color:#E4E4E7; font-family:'DM Mono',monospace; line-height:1;\">01<\u002Fspan>\n      <p style=\"font-size:var(--type-small); font-weight:600; color:#18181B; line-height:1.35;\">Check-ins slow every session down<\u002Fp>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.6;\">Paper lists, late arrivals, name spellings — someone always has to chase people at the door.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; background:#FFFFFF; border:1px solid #E4E4E7; border-radius:16px; padding:40px 36px; display:flex; flex-direction:column; gap:20px;\">\n      <span style=\"font-size:52px; font-weight:700; color:#E4E4E7; font-family:'DM Mono',monospace; line-height:1;\">02<\u002Fspan>\n      <p style=\"font-size:var(--type-small); font-weight:600; color:#18181B; line-height:1.35;\">Fair court rotation is impossible to manage manually<\u002Fp>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.6;\">The same players get too many games or wait too long — fairness becomes guesswork.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; background:#FFFFFF; border:1px solid #E4E4E7; border-radius:16px; padding:40px 36px; display:flex; flex-direction:column; gap:20px;\">\n      <span style=\"font-size:52px; font-weight:700; color:#E4E4E7; font-family:'DM Mono',monospace; line-height:1;\">03<\u002Fspan>\n      <p style=\"font-size:var(--type-small); font-weight:600; color:#18181B; line-height:1.35;\">Session fees and balances get lost or forgotten<\u002Fp>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.6;\">Cash, credits, top-ups — tracking who paid what becomes its own job entirely.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════ SLIDE 3 · Core features ════ -->\n<section data-label=\"03\" data-screen-label=\"Core features\" style=\"background:#18181B; display:flex; flex-direction:column; padding:var(--pad-y) var(--pad-x); font-family:'DM Sans',system-ui,sans-serif; justify-content:center; gap:52px;\" data-speaker-notes=\"AutoRally is built around four core modules. Each one addresses one of those pain points directly.\">\n\n  <div style=\"display:flex; flex-direction:column; gap:16px;\">\n    <span style=\"font-size:var(--type-micro); font-weight:600; color:#52525B; letter-spacing:0.08em; text-transform:uppercase;\">What it does<\u002Fspan>\n    <h2 style=\"font-size:var(--type-title); font-weight:700; color:#FFFFFF; letter-spacing:-0.025em; line-height:1.08;\">Core features<\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px;\">\n\n    <div style=\"background:#27272A; border:1px solid #3F3F46; border-radius:16px; padding:36px; display:flex; flex-direction:column; gap:16px;\">\n      <div style=\"width:48px; height:48px; border-radius:12px; background:#1C1C1F; border:1px solid #3F3F46; display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"22\" height=\"22\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"#A1A1AA\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"7\" r=\"3.5\"><\u002Fcircle><path stroke-linecap=\"round\" d=\"M3 20c0-4.4 4-8 9-8s9 3.6 9 8\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-size:var(--type-label); font-weight:700; color:#FFFFFF; letter-spacing:-0.01em;\">Player Management<\u002Fh3>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.55;\">Profiles, skill levels, contact details, and credit balances for your entire club.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"background:#27272A; border:1px solid #3F3F46; border-radius:16px; padding:36px; display:flex; flex-direction:column; gap:16px;\">\n      <div style=\"width:48px; height:48px; border-radius:12px; background:#1C1C1F; border:1px solid #3F3F46; display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"22\" height=\"22\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"#A1A1AA\" stroke-width=\"1.5\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path stroke-linecap=\"round\" d=\"M8 2v4M16 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-size:var(--type-label); font-weight:700; color:#FFFFFF; letter-spacing:-0.01em;\">Sessions &amp; Check-in<\u002Fh3>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.55;\">Start a session, check players in, and track who's on court in real time.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"background:#052E16; border:1px solid #065F46; border-radius:16px; padding:36px; display:flex; flex-direction:column; gap:16px;\">\n      <div style=\"width:48px; height:48px; border-radius:12px; background:#064E3B; border:1px solid #065F46; display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"22\" height=\"22\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"#34D399\" stroke-width=\"1.5\"><path stroke-linecap=\"round\" d=\"M4 6h16M4 12h10M4 18h7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-size:var(--type-label); font-weight:700; color:#FFFFFF; letter-spacing:-0.01em;\">Smart Match Generation<\u002Fh3>\n      <p style=\"font-size:24px; color:#71717A; line-height:1.55;\">Automatic, fair court allocation balancing skill level, wait time, and partner rotation.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"background:#27272A; border:1px solid #3F3F46; border-radius:16px; padding:36px; display:flex; flex-direction:column; gap:16px;\">\n      <div style=\"width:48px; height:48px; border-radius:12px; background:#1C1C1F; b ntent:space-between; box-shadow:0 2px 8px -4px rgba(0,0,0,0.04);\">\n      <div style=\"display:flex; flex-direction:column; gap:6px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <span style=\"font-size:16px; font-weight:700; color:#18181B;\">Winter Club Championship<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:#059669; background:#D1FAE5; padding:3px 10px; border-radius:9999px;\">\n            <span style=\"width:5px; height:5px; border-radius:50%; background:#059669; animation:pulse 2s infinite; display:inline-block;\"><\u002Fspan>\n            Active\n          <\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-size:13px; color:#71717A;\">Round Robin &nbsp;·&nbsp; 4 courts &nbsp;·&nbsp; 28 Jun 2026<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:14px; font-weight:600; color:#18181B; font-family:'DM Mono',monospace; background:#F4F4F5; padding:6px 14px; border-radius:8px; flex-shrink:0; margin-left:16px;\">16 players<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"background:#FFFFFF; border:1px solid #E4E4E7; border-radius:16px; padding:24px 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px -4px rgba(0,0,0,0.04);\">\n      <div style=\"display:flex; flex-direction:column; gap:6px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <span style=\"font-size:16px; font-weight:700; color:#18181B;\">Mixed Doubles Open<\u002Fspan>\n          <span style=\"font-size:11px; font-weight:600; color:#71717A; background:#F4F4F5; padding:3px 10px; border-radius:9999px;\">Upcoming<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-size:13px; color:#71717A;\">Knockout &nbsp;·&nbsp; 3 courts &nbsp;·&nbsp; 12 Jul 2026<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:14px; font-weight:600; color:#18181B; font-family:'DM Mono',monospace; backgroun
