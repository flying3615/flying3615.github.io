  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tify-content:space-between; }\n    .striplabel { font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#21242e; }\n    .stripcount { font-family:'VT323',monospace;font-size:26px;color:#3d4f97; }\n    .cmdname { font-family:'Arial Black',Arial,sans-serif;font-weight:900;line-height:1;color:#e48600;-webkit-text-stroke:2px #21242e;text-shadow:4px 4px 0 #21242e; }\n    .panel { background:#ffffff;border:2px solid #3d4f97;border-radius:4px;overflow:hidden; }\n    .paneltab { padding:12px 24px;border-bottom:2px solid #b07800;background:#ecab37; }\n    .paneltabtext { font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#21242e; }\n    .panelbody { padding:22px 26px;font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:400;color:#21242e;line-height:1.45; }\n    .bulletlist { list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:16px; }\n    .bulletlist li { padding-left:30px;position:relative; }\n    .bulletlist li::before { content:\"\\25B6\";position:absolute;left:0;top:2px;color:#f68d1f;font-size:16px; }\n    .usagebox { background:#21242e;background-image:radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);background-size:4px 4px;border-radius:3px;padding:16px 20px;font-family:'VT323',monospace;font-size:24px;line-height:1.5;color:#9fbee7; }\n    .footchip { display:inline-flex;align-items:center;gap:10px;background:#ecab37;border-radius:3px;padding:8px 16px; }\n    .foottext { font-family:Arial;font-size:24px;font-weight:700;color:#21242e;text-transform:uppercase; }\n    .footfooter { flex-shrink:0;background:#21242e;background-image:radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);background-size:4px 4px;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;border-top:3px solid #3d4f97; }\n    .footurl { font-family:Arial,Helvetica,sans-serif;font-size:24px;color:#9fbee7;letter-spacing:0.3px; }\n    .frame { width:100%;height:100%;background:#7a8aba;box-sizing:border-box;display:flex;flex-direction:column;overflow:hidden;clip-path:polygon(28px 0%, calc(100% - 28px) 0%, 100% 28px, 100% calc(100% - 28px), calc(100% - 28px) 100%, 28px 100%, 0% calc(100% - 28px), 0% 28px); }\n    .outer { width:1920px;height:1080px;background:#21242e;padding:18px;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"3fc0bed1-9141-439a-981c-6560c38dc099#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <section data-label=\"Title\" data-speaker-notes=\"Introduce the registry repo and its two plugins.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><div style=\"flex:1;\"><\u002Fdiv><div class=\"footchip\"><span class=\"foottext\">Claude Code Registry<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Project Briefing<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:48px 60px 40px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:58px;letter-spacing:-0.5px;max-width:1800px;\">Landonline Pinakes Plugins<\u002Fdiv>\n        <div style=\"margin-top:24px;font-family:Arial,Helvetica,sans-serif;font-size:32px;font-weight:700;line-height:1.3;color:#21242e;max-width:1500px;\">A lightweight plugin registry — install the Pinakes MCP server and ten slash commands into Claude Code without cloning the full knowledge-graph source.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px 60px;\">\n        <div style=\"display:flex;gap:48px;\">\n          <div class=\"panel\" style=\"width:380px;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What's Inside<\u002Fspan><\u002Fdiv><div class=\"panelbody\" style=\"display:flex;align-items:baseline;gap:16px;\"><span style=\"font-family:'Arial Black',Arial,sans-serif;font-size:56px;font-weight:900;color:#3d4f97;line-height:1;\">2<\u002Fspan><span style=\"font-size:24px;font-weight:700;text-transform:uppercase;\">Plugins<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"panel\" style=\"width:380px;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Skills<\u002Fspan><\u002Fdiv><div class=\"panelbody\" style=\"display:flex;align-items:baseline;gap:16px;\"><span style=\"font-family:'Arial Black',Arial,sans-serif;font-size:56px;font-weight:900;color:#3d4f97;line-height:1;\">10<\u002Fspan><span style=\"font-size:24px;font-weight:700;text-transform:uppercase;\">Slash Commands<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"panel\" style=\"width:380px;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Hooks<\u002Fspan><\u002Fdiv><div class=\"panelbody\" style=\"display:flex;align-items:baseline;gap:16px;\"><span style=\"font-family:'Arial Black',Arial,sans-serif;font-size:56px;font-weight:900;color:#3d4f97;line-height:1;\">1<\u002Fspan><span style=\"font-size:24px;font-weight:700;text-transform:uppercase;\">Session Hook<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">Registry Only<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Two Plugins\" data-speaker-notes=\"pinakes-mcp connects the MCP server; pinakes-skills brings the slash commands and hook.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Overview<\u002Fspan><span class=\"stripcount\">2 Plugins<\u002Fspan><\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:60px 60px;\">\n        <div class=\"panel\" style=\"flex:1;\">\n          <div class=\"paneltab\"><span class=\"paneltabtext\">pinakes-mcp<\u002Fspan><\u002Fdiv>\n          <div class=\"panelbody\">Registers the Pinakes MCP server with Claude Code — an SSE connection to <span style=\"font-family:'VT323',monospace;font-size:26px;\">localhost:4113<\u002Fspan>.\n            <div style=\"margin-top:22px;font-size:24px;color:#3d4f97;font-weight:700;\">Requires the Pinakes stack to be running.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\">\n          <div class=\"paneltab\"><span class=\"paneltabtext\">pinakes-skills<\u002Fspan><\u002Fdiv>\n          <div class=\"panelbody\">Ten slash commands for the Landonline codebase, plus a <span style=\"font-weight:700;\">SessionStart<\u002Fspan> hook that injects an environment manifest and repo guide into every session.\n            <div style=\"margin-top:22px;font-size:24px;color:#3d4f97;font-weight:700;\">Covered one at a time on the following slides.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">Registry Only<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/sprint\" data-speaker-notes=\"Maps the current Jira sprint to repos and surfaces cross-repo risks.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Sprint &amp; Delivery<\u002Fspan><span class=\"stripcount\">Command 1 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:72px;\">/sprint<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Pulls the active sprint from Jira and groups tickets into themes<\u002Fli><li>Maps each theme to repos via Pinakes' <span style=\"font-weight:700;\">ask_architecture<\u002Fspan> graph search<\u002Fli><li>Flags cross-repo risks — shared repos, unclear scope, blocked dependencies<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/sprint<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Board ID is team-specific — set in config.json.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/synthesise\" data-speaker-notes=\"Builds or updates a domain knowledge wiki in the Obsidian vault.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Knowledge<\u002Fspan><span class=\"stripcount\">Command 2 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:72px;\">/synthesise<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Reads source code, DB schema (landonline-pgdb), the cross-repo graph, and Confluence<\u002Fli><li>Resolves open questions across those four layers before writing anything<\u002Fli><li>Writes to the vault's Domain-Knowledge folder — updates in place if the page exists<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/synthesise &lt;domain&gt;<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Never touches domains/ or repos/ — CI-owned.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/refresh-knowledge\" data-speaker-notes=\"Checks Domain-Knowledge wiki pages against real repo activity via gh api.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Knowledge<\u002Fspan><span class=\"stripcount\">Command 3 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:58px;\">/refresh-knowledge<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Checks each page's <span style=\"font-weight:700;\">sources:<\u002Fspan> frontmatter against real GitHub activity via <span style=\"font-family:'VT323',monospace;font-size:26px;\">gh api<\u002Fspan><\u002Fli><li>Never trusts local checkouts — those drift out of sync with upstream<\u002Fli><li>Reports STALE / FRESH / UNKNOWN; re-synthesises only with <span style=\"font-family:'VT323',monospace;font-size:26px;\">--apply<\u002Fspan>, one page at a time<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/refresh-knowledge<br>&nbsp;&nbsp;[&lt;category-or-page&gt;]<br>&nbsp;&nbsp;[--apply]<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Report-only by default — never edits without --apply.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/analyse-sproc\" data-speaker-notes=\"Reads and explains Landonline stored procedure code.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Knowledge<\u002Fspan><span class=\"stripcount\">Command 4 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:64px;\">/analyse-sproc<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Looks up PostgreSQL and Informix procedures by name, exception code, or question<\u002Fli><li>Traces call chains and table usage through Pinakes' structured catalog<\u002Fli><li>Explains logic in business terms — parcels, surveys, marks — not variable names<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/analyse-sproc<br>&nbsp;&nbsp;&lt;name or question&gt;<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Call-chain tracing covers PostgreSQL only.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/work-story\" data-speaker-notes=\"Works a Jira story end-to-end: research, implement, draft PR.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Sprint &amp; Delivery<\u002Fspan><span class=\"stripcount\">Command 5 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:68px;\">/work-story<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Delegates research to a read-only subagent, saves a brief for review<\u002Fli><li>Implements in an isolated git worktree with a self-healing lint/type-check/test loop and its own bug self-review<\u002Fli><li>Opens a draft PR and hands off to /ship-pr — fully resume-safe across sessions<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/work-story &lt;JIRA-ID&gt;<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Pauses for brief review before implementing.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/review-pr\" data-speaker-notes=\"Validates a PR against its Jira story ACs, scope, and dependency graph.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Sprint &amp; Delivery<\u002Fspan><span class=\"stripcount\">Command 6 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:68px;\">/review-pr<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Gathers the PR diff, its Jira ACs, and Pinakes context (repo guide, dependents, related repos)<\u002Fli><li>Checks each acceptance criterion against the diff and flags scope or dependency risk<\u002Fli><li>Deliberately not a code review — it never comments on the PR<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/review-pr<br>&nbsp;&nbsp;&lt;PR-URL or number&gt;<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Bug-level review happens in work-story, not here.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/babysit-pr\" data-speaker-notes=\"Monitors a PR until it merges, fixing CI failures and reviewer comments automatically.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Sprint &amp; Delivery<\u002Fspan><span class=\"stripcount\">Command 7 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:60px;\">/babysit-pr<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Rechecks deadline, merge state, CI, and description-vs-diff drift every tick<\u002Fli><li>Auto-fixes lint/test/build failures and automatable review comments<\u002Fli><li>Escalates conflicts and design questions; reports readiness — never merges itself<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/babysit-pr &lt;PR-URL&gt;<br>&nbsp;&nbsp;[--timeout &lt;N&gt;h]<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Default timeout 2h — never auto-merges.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/ship-pr\" data-speaker-notes=\"Runs review-pr first, then hands off to babysit-pr unless the review surfaces blockers.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Sprint &amp; Delivery<\u002Fspan><span class=\"stripcount\">Command 8 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:68px;\">/ship-pr<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Runs <span style=\"font-weight:700;\">/review-pr<\u002Fspan> in an isolated subagent first<\u002Fli><li>Clean verdict → starts <span style=\"font-weight:700;\">/babysit-pr<\u002Fspan> automatically<\u002Fli><li>Warning → pauses for the user; real issues → stops before babysit runs<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/ship-pr<br>&nbsp;&nbsp;&lt;PR-URL or number&gt;<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">A thin wrapper — no logic duplicated.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/ecr-login\" data-speaker-notes=\"Refreshes AWS CodeArtifact and ECR credentials. Windows and WSL only.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Operations<\u002Fspan><span class=\"stripcount\">Command 9 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:68px;\">/ecr-login<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Launches Azure SSO and fetches a fresh CodeArtifact token<\u002Fli><li>Writes the token to the Windows-side gradle.properties<\u002Fli><li>Logs Docker into the linz ECR registry — login only, never runs a build<\u002Fli><\u002Ful>\n          <div style=\"margin-top:22px;font-size:24px;color:#3d4f97;font-weight:700;\">Windows + WSL only.<\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/ecr-login<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">AWS profile is team-specific — config.json.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"/daily-start\" data-speaker-notes=\"Morning bootstrap: starts the Pinakes stack, syncs data, refreshes auth, prunes worktrees, writes a daily brief.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Operations<\u002Fspan><span class=\"stripcount\">Command 10 of 10<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:64px;\">/daily-start<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Health-checks the Pinakes stack and starts it if down, then syncs data<\u002Fli><li>Refreshes ECR auth if stale and prunes leftover git worktrees<\u002Fli><li>Snapshots open PRs/review requests and writes a daily brief with a staleness nudge<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Usage<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><div class=\"usagebox\">/daily-start<br>&nbsp;&nbsp;[--no-brief] [--no-auth]<br>&nbsp;&nbsp;[--no-sync] [--no-staleness]<\u002Fdiv><div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Never blocks the run on one failed step.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"SessionStart Hook\" data-speaker-notes=\"Injects an environment manifest, repo guide, and core tool rules into every session automatically.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Hook<\u002Fspan><span class=\"stripcount\">Runs Automatically<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:64px;\">SessionStart<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:flex-start;gap:32px;padding:48px 60px;\">\n        <div class=\"panel\" style=\"flex:2;\"><div class=\"paneltab\"><span class=\"paneltabtext\">What It Does<\u002Fspan><\u002Fdiv><div class=\"panelbody\"><ul class=\"bulletlist\"><li>Resolves the Obsidian vault and reads the per-repo summary CI writes on each sync<\u002Fli><li>Injects it with an environment manifest and core Pinakes tool rules at session start<\u002Fli><li>Also injects resolved paths for daily-start, ecr-login, and work-story — no skill hand-derives Windows/WSL logic<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n        <div class=\"panel\" style=\"flex:1;\"><div class=\"paneltab\"><span class=\"paneltabtext\">Included In<\u002Fspan><\u002Fdiv><div class=\"panelbody\" style=\"font-size:24px;\">pinakes-skills<div style=\"margin-top:18px;font-size:24px;color:#3d4f97;font-weight:700;\">Runs automatically — no command to type.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">pinakes-skills<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Install\" data-speaker-notes=\"Add the marketplace, then install each plugin.\">\n    <div class=\"outer\"><div class=\"frame\">\n      <div class=\"nb\"><div class=\"logo\"><span class=\"logotext\">Pinakes<\u002Fspan><\u002Fdiv><span class=\"breadcrumb\">Landonline / Plugins<\u002Fspan><\u002Fdiv>\n      <div class=\"strip\"><span class=\"striplabel\">Get Started<\u002Fspan><\u002Fdiv>\n      <div style=\"flex-shrink:0;background:#acace7;border-bottom:3px solid #3d4f97;padding:44px 60px 32px 60px;\">\n        <div class=\"cmdname\" style=\"font-size:64px;\">Install<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:20px 60px;\">\n        <div class=\"panel\" style=\"width:100%;max-width:1500px;\">\n          <div class=\"paneltab\"><span class=\"paneltabtext\">Claude Code<\u002Fspan><\u002Fdiv>\n          <div class=\"panelbody\">\n            <div class=\"usagebox\">/plugin marketplace add linz/landonline-pinakes-plugins<br>/plugin install pinakes-mcp@landonline-pinakes-plugins<br>/plugin install pinakes-skills@landonline-pinakes-plugins<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footfooter\"><span class=\"footurl\">github.com/linz/landonline-pinakes-plugins<\u002Fspan><div class=\"footchip\"><span class=\"foottext\">Registry Only<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
